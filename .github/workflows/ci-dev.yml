---
name: CI - Dev (Build + Test)

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**.md'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Run tests
        run: mvn clean verify

      - name: Build Docker Image
        run: |
          docker build \
            -t process-video:${{ github.sha }} \
            .
