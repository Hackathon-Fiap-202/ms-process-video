---
name: CI - Build, Testes, Docker e PR

on:
  push:
    branches-ignore:
      - main
      - hom
      - dev
    paths-ignore:
      - '**.md'

jobs:

  test:
    name: Unit + Integration Tests (Docker Compose)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Verificar Docker Compose
        run: docker compose version

      - name: Subir LocalStack
        run: docker compose up -d localstack

      - name: Aguardar LocalStack
        run: |
          echo "Aguardando LocalStack subir..."
          sleep 25

      - name: Rodar testes
        run: mvn clean verify

      - name: Derrubar containers
        if: always()
        run: docker compose down -v


  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build Docker Image
        run: |
          docker build \
            -t process-video:${{ github.sha }} \
            .