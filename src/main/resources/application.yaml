spring:
  application:
    name: process-video
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    aws:
      sqs:
        listener:
          poll-timeout: 40

app:
  s3:
    bucket-videos: video-storage-bucket
    bucket-frames: frame-storage-bucket
  buckets:
    video-bucket-name: ${APP_BUCKETS_VIDEO_BUCKET_NAME:nextime-frame-video-storage}
    video-input-prefix: ${APP_BUCKETS_VIDEO_INPUT_PREFIX:video-input-storage/}
    video-processed-prefix: ${APP_BUCKETS_VIDEO_PROCESSED_PREFIX:video-processed-storage/}
  queues:
    video-process-command: video-process-command
    video-updated-event: video-updated-event
  sqs:
    video-process-command-url: ${SQS_VIDEO_PROCESS_COMMAND_URL:http://localhost:4566/000000000000/video-process-command}
    video-updated-event-url: ${SQS_VIDEO_UPDATED_EVENT_URL:http://localhost:4566/000000000000/video-updated-event}
  frame-extraction:
    thread-pool-size: 4
    queue-capacity: 100
