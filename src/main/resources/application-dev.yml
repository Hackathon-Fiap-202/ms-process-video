spring:
  cloud:
    aws:
      region:
        static: us-east-1
      s3:
        endpoint: http://localstack:4566
        path-style-access-enabled: true
      sqs:
        endpoint: http://localstack:4566
      credentials:
        access-key: test
        secret-key: test

io:
  awspring:
    cloud:
      sqs:
        listener:
          poll-timeout: 10
          max-concurrent-messages: 1
          max-messages-per-poll: 1
          acknowledgement-mode: MANUAL
          queue-attributes-resolution-strategy: INHERIT

