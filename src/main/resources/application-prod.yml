spring:
  cloud:
    aws:
      region:
        static: us-east-1
      s3:
        path-style-access-enabled: false

app:
  frame-extraction:
    thread-pool-size: #{T(java.lang.Runtime).getRuntime().availableProcessors() * 2}  # Automatic: 2x CPU cores
    queue-capacity: 500   # Larger queue for high-throughput production
