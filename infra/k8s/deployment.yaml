apiVersion: apps/v1
kind: Deployment
metadata:
  name: process-video
  namespace: default
  labels:
    app: process-video
spec:
  replicas: 2
  selector:
    matchLabels:
      app: process-video
  template:
    metadata:
      labels:
        app: process-video
        tags.datadoghq.com/service: process-video
        tags.datadoghq.com/env: prod
        tags.datadoghq.com/version: "0.0.1"
    spec:
      serviceAccountName: process-video-sa
      containers:
        - name: process-video
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/process-video:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: process-video-config
            - secretRef:
                name: process-video-secrets
          env:
            - name: DD_SERVICE
              value: process-video
            - name: DD_ENV
              value: prod
            - name: DD_VERSION
              value: "0.0.1"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=70.0"  
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
